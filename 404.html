<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Сектор не найден | DiskX</title>
    <style>
        :root {
            --bg: #050505;
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --accent: #d4af37;
            --border: #2a2a2a;
            --error: #ff3333;
        }

        body {
            font-family: "Segoe UI", Tahoma, monospace;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 500px;
            padding: 40px;
            border: 1px solid var(--border);
            background: #0a0a0a;
        }

        .error-code {
            font-size: 72px;
            font-weight: 900;
            color: var(--error);
            letter-spacing: 5px;
            margin: 0;
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 20px 0;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #fff;
        }

        .terminal-info {
            margin-top: 30px;
            font-family: monospace;
            font-size: 11px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">404</div>
    <h1>Критическая ошибка доступа</h1>
    <p>Запрошенный сектор данных не найден или был перемещен. Возможно, ссылка устарела или в адресе допущена опечатка.</p>
    
    <a href="https://diskxprogram.github.io/" class="btn-home">Вернуться в главный модуль</a>

    <div class="terminal-info">
        Status: Sector_Not_Found // Code: 0x00000404
    </div>
</div>

</body>
</html>
